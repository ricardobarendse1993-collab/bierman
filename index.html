<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dimitri's Bierrace 🍺</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#08000f;font-family:'Nunito',sans-serif;color:#fff;user-select:none;-webkit-user-select:none;touch-action:none;}
:root{--nb:#00f5ff;--np:#ff00aa;--ng:#00ff88;--npu:#bf00ff;--gold:#FFD700;--red:#ff3333;}

/* ALL SCREENS hidden by default */
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;z-index:1;}
.screen.active{display:flex;}

/* LOGIN */
#loginScreen{background:radial-gradient(ellipse at 50% 35%,#1a0035,#08000f);}
.lbox{background:rgba(0,0,0,.85);border:1px solid var(--nb);border-radius:18px;padding:32px 40px;width:340px;max-width:92vw;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 0 40px rgba(0,245,255,.2);}
.ltitle{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:4px;color:var(--nb);text-shadow:0 0 20px var(--nb);line-height:1;text-align:center;}
.lsub{font-family:'Fredoka One',cursive;color:var(--np);font-size:.88rem;}
.tabs{display:flex;gap:6px;width:100%;}
.tb{flex:1;padding:8px;border:1px solid #333;background:transparent;color:#666;font-family:'Fredoka One',cursive;font-size:.88rem;border-radius:8px;cursor:pointer;transition:.2s;}
.tb.on{border-color:var(--nb);color:var(--nb);background:rgba(0,245,255,.08);}
.inp{width:100%;padding:10px 12px;border:1px solid #2a2a2a;border-radius:8px;background:rgba(255,255,255,.05);color:#fff;font-size:.9rem;outline:none;}
.inp:focus{border-color:var(--nb);}
.inp::placeholder{color:#444;}
.lbtn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--nb),var(--npu));color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;cursor:pointer;transition:.2s;}
.lbtn:hover{transform:translateY(-2px);}
.lmsg{font-size:.8rem;text-align:center;min-height:16px;}
.lmsg.err{color:var(--red);}.lmsg.ok{color:var(--ng);}

/* MENU */
#menuScreen{background:radial-gradient(ellipse at 50% 40%,#1a0035,#08000f);}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:3.6rem;color:var(--nb);letter-spacing:5px;text-align:center;line-height:1;text-shadow:0 0 30px var(--nb);}
.msub{font-family:'Fredoka One',cursive;color:var(--np);font-size:.95rem;margin-top:-4px;}
.mwelcome{font-family:'Fredoka One',cursive;color:var(--ng);font-size:.9rem;margin-bottom:4px;}
.mbtns{display:flex;flex-direction:column;gap:10px;width:250px;margin-top:16px;}
.mbtn{padding:13px;border-radius:11px;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:3px;cursor:pointer;border:none;text-align:center;transition:.2s;}
.mbtn.pri{background:linear-gradient(135deg,var(--nb),var(--npu));color:#fff;}
.mbtn.sec{background:transparent;border:1px solid var(--np);color:var(--np);}
.mbtn.ter{background:transparent;border:1px solid #333;color:#555;}
.mbtn:hover{transform:scale(1.03);}

/* SCOREBOARD */
#scoreScreen{background:radial-gradient(ellipse at center,#15001a,#08000f);gap:14px;padding:24px;overflow-y:auto;justify-content:flex-start;padding-top:40px;}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;color:var(--np);letter-spacing:4px;}
.score-tabs{display:flex;gap:8px;width:100%;max-width:540px;}
.stab{flex:1;padding:8px;border:1px solid #333;background:transparent;color:#666;font-family:'Fredoka One',cursive;font-size:.82rem;border-radius:8px;cursor:pointer;transition:.2s;}
.stab.on{border-color:var(--np);color:var(--np);background:rgba(255,0,170,.08);}
.stable{width:100%;max-width:540px;border-collapse:collapse;}
.stable th{background:rgba(255,0,170,.12);color:var(--np);font-family:'Fredoka One',cursive;padding:9px 10px;text-align:left;}
.stable td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem;}
.r1 td{color:var(--gold);}.r2 td{color:#C0C0C0;}.r3 td{color:#CD7F32;}
.you-badge{font-size:.6rem;background:rgba(0,245,255,.12);border:1px solid var(--nb);color:var(--nb);padding:1px 4px;border-radius:6px;margin-left:4px;}

/* GAME SCREEN — full viewport, canvas fills everything below HUD */
#gameScreen{background:#000;justify-content:flex-start;align-items:stretch;position:fixed;inset:0;}
#topBar{
  background:rgba(0,0,0,.97);border-bottom:1px solid rgba(0,245,255,.2);
  padding:4px 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  flex-shrink:0;width:100%;
}
.hl{font-size:.52rem;color:#555;font-family:'Fredoka One',cursive;letter-spacing:1px;text-transform:uppercase;}
.hv{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#fff;letter-spacing:1px;line-height:1.1;}
.hv.gold{color:var(--gold);}.hv.blue{color:var(--nb);}
.dbwrap{flex:1;min-width:80px;}
.dbtrack{height:13px;background:rgba(255,255,255,.06);border-radius:6px;border:1px solid #222;overflow:hidden;}
.dbfill{height:100%;border-radius:5px;transition:width .3s;}
#livesRow{display:flex;gap:3px;align-items:center;}
.idc{width:28px;height:18px;border-radius:3px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:.44rem;font-weight:900;line-height:1;text-align:center;transition:.3s;}
.idc.pp{border-color:#cc4400;background:rgba(204,68,0,.12);color:#ff7733;}
.idc.rij{border-color:#4499cc;background:rgba(68,153,204,.12);color:#66bbff;}
.idc.idk{border-color:#44cc66;background:rgba(68,204,102,.12);color:#66ff99;}
.idc.lost{opacity:.12;filter:grayscale(1);}
.hbtn{background:transparent;border:1px solid;border-radius:6px;cursor:pointer;font-family:'Fredoka One',cursive;font-size:.75rem;padding:4px 9px;transition:.2s;}
.hbtn.pause{border-color:var(--nb);color:var(--nb);}
.hbtn.exit{border-color:#333;color:#555;}

/* Canvas container — fills remaining height */
#canvasContainer{flex:1;position:relative;overflow:hidden;background:#000;display:flex;align-items:flex-start;justify-content:center;width:100%;}
#gc{display:block;image-rendering:pixelated;}

/* HUD overlays on canvas */
#wcAlert{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.95);border:2px solid var(--np);border-radius:20px;padding:4px 16px;font-family:'Fredoka One',cursive;color:var(--np);font-size:.82rem;display:none;z-index:20;white-space:nowrap;}
#wcAlert.show{display:block;animation:wcpulse 1s infinite;}
@keyframes wcpulse{0%,100%{box-shadow:0 0 8px var(--np)}50%{box-shadow:0 0 22px var(--np)}}
#dayBanner{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.8);border:1px solid;border-radius:8px;padding:3px 8px;font-family:'Fredoka One',cursive;font-size:.7rem;z-index:20;pointer-events:none;}

/* GAME OVER / WIN OVERLAY — inside canvasContainer */
#gameOverlay{position:absolute;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;backdrop-filter:blur(4px);overflow-y:auto;padding:20px;}
#gameOverlay.show{display:flex;}
.ovt{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:4px;text-align:center;}
.ovs{font-family:'Fredoka One',cursive;font-size:.95rem;color:#bbb;text-align:center;max-width:300px;line-height:1.5;}
.ovbtns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.ovbtn{padding:11px 24px;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;cursor:pointer;border:none;transition:.2s;}
.ovbtn.p{background:linear-gradient(135deg,var(--nb),var(--npu));color:#fff;}
.ovbtn.s{background:transparent;border:1px solid #444;color:#888;}
.ovbtn:hover{transform:scale(1.04);}
#scoreBox{background:rgba(0,0,0,.7);border:1px solid rgba(0,245,255,.25);border-radius:12px;padding:12px 18px;min-width:240px;max-width:88vw;display:none;flex-direction:column;gap:5px;}
#scoreBox.show{display:flex;}
#lbBox{background:rgba(0,0,0,.7);border:1px solid rgba(255,0,170,.25);border-radius:12px;padding:10px 14px;min-width:240px;max-width:88vw;display:none;flex-direction:column;gap:2px;}
#lbBox.show{display:flex;}

/* PAUSE OVERLAY */
#pauseOverlay{position:absolute;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:60;backdrop-filter:blur(6px);}
#pauseOverlay.show{display:flex;}
.pause-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:var(--nb);letter-spacing:4px;text-shadow:0 0 30px var(--nb);}
.pause-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.pbtn{padding:12px 26px;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;cursor:pointer;border:none;transition:.2s;}
.pbtn.cont{background:linear-gradient(135deg,var(--nb),var(--npu));color:#fff;}
.pbtn.menu{background:transparent;border:1px solid #444;color:#888;}
.pbtn:hover{transform:scale(1.04);}

/* score-pop */
.score-pop{position:absolute;font-family:'Bebas Neue',sans-serif;pointer-events:none;z-index:40;animation:popUp .9s forwards;}
@keyframes popUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}

/* toast */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(0,0,0,.95);border:1.5px solid var(--nb);border-radius:16px;padding:6px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--nb);opacity:0;transition:.25s;z-index:9999;white-space:nowrap;pointer-events:none;max-width:92vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="lbox">
    <div style="font-size:2rem;animation:sway 2s ease-in-out infinite;display:inline-block">🍺</div>
    <style>@keyframes sway{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}</style>
    <div class="ltitle">DIMITRI'S<br>BIERRACE</div>
    <div class="lsub">Pac-Man met promillage 🎮</div>
    <div class="tabs">
      <button class="tb on" id="tabIn" onclick="switchTab('in')">Inloggen</button>
      <button class="tb" id="tabReg" onclick="switchTab('reg')">Registreren</button>
    </div>
    <input class="inp" id="uIn" type="text" placeholder="Gebruikersnaam" maxlength="20" autocomplete="off">
    <input class="inp" id="pIn" type="password" placeholder="Wachtwoord" autocomplete="off">
    <input class="inp" id="cIn" type="password" placeholder="Bevestig wachtwoord" style="display:none" autocomplete="off">
    <div class="lmsg" id="lmsg"></div>
    <button class="lbtn" id="authBtn" onclick="doAuth()">SPEEL!</button>
  </div>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen">
  <div class="mwelcome" id="mwelcome"></div>
  <div class="mtitle">DIMITRI'S<br>BIERRACE</div>
  <div class="msub">🍺 Neon Kroeg Edition</div>
  <div class="mbtns">
    <button class="mbtn pri" id="playBtn">▶ SPELEN</button>
    <button class="mbtn sec" id="scoreBtn">🏆 SCOREBORD</button>
    <button class="mbtn ter" id="logoutBtn">🚪 UITLOGGEN</button>
  </div>
</div>

<!-- SCOREBOARD -->
<div id="scoreScreen" class="screen">
  <div class="stitle">🏆 SCOREBORD</div>
  <div class="score-tabs">
    <button class="stab on" id="stab0">Mijn scores</button>
    <button class="stab" id="stab1">🌍 Iedereen</button>
  </div>
  <table class="stable">
    <thead><tr><th>#</th><th>Speler</th><th>Score</th><th>Level</th><th>Bier</th><th>Dag</th></tr></thead>
    <tbody id="scoreBody"></tbody>
  </table>
  <button class="mbtn sec" id="scoreBackBtn" style="width:200px;margin-top:16px;">← Terug</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="topBar">
    <div><div class="hl">Score</div><div class="hv gold" id="hScore">0</div></div>
    <div><div class="hl">Level</div><div class="hv blue" id="hLevel">1</div></div>
    <div><div class="hl">Bier🍺</div><div class="hv" id="hBeers">0</div></div>
    <div><div class="hl">Geld💰</div><div class="hv gold" id="hMoney">€0</div></div>
    <div class="dbwrap">
      <div class="hl" style="display:flex;justify-content:space-between;"><span>Dronken</span><span id="hDrunk">0%</span></div>
      <div class="dbtrack"><div class="dbfill" id="dbFill" style="width:0%"></div></div>
    </div>
    <div id="livesRow">
      <div class="idc pp" id="d0">PAS<br>POORT</div>
      <div class="idc rij" id="d1">RIJE<br>WIJS</div>
      <div class="idc idk" id="d2">ID<br>KAART</div>
    </div>
    <button class="hbtn pause" id="pauseBtn">⏸</button>
    <button class="hbtn exit" id="exitBtn">✕</button>
  </div>

  <div id="canvasContainer">
    <canvas id="gc"></canvas>
    <div id="wcAlert">🚽 WC! <span id="wcSec">25</span>s</div>
    <div id="dayBanner"></div>

    <!-- PAUSE -->
    <div id="pauseOverlay">
      <div class="pause-title">⏸ PAUZE</div>
      <div style="font-family:'Fredoka One',cursive;color:#888;font-size:.95rem;">P of knop om verder</div>
      <div class="pause-btns">
        <button class="pbtn cont" id="contBtn">▶ VERDER</button>
        <button class="pbtn menu" id="pauseMenuBtn">← MENU</button>
      </div>
    </div>

    <!-- GAME OVER / WIN -->
    <div id="gameOverlay">
      <div class="ovt" id="ovTitle">GAME OVER</div>
      <div class="ovs" id="ovSub"></div>
      <div id="scoreBox">
        <div style="font-family:'Fredoka One',cursive;font-size:.75rem;color:#555;text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;">Scoreoverzicht</div>
        <div id="scoreBreakdown" style="font-family:'Fredoka One',cursive;font-size:.82rem;color:#ccc;display:flex;flex-direction:column;gap:3px;"></div>
        <div style="border-top:1px solid #222;margin-top:4px;padding-top:5px;display:flex;justify-content:space-between;">
          <span style="font-family:'Fredoka One',cursive;color:#888;font-size:.75rem;">TOTAAL</span>
          <span id="ovTotal" style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--gold);"></span>
        </div>
      </div>
      <div id="lbBox">
        <div style="font-family:'Fredoka One',cursive;font-size:.75rem;color:#555;text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;">🏆 Top scores</div>
        <div id="lbRows" style="display:flex;flex-direction:column;gap:2px;max-height:140px;overflow-y:auto;"></div>
      </div>
      <div class="ovbtns">
        <button class="ovbtn p" id="ovRetry">Opnieuw</button>
        <button class="ovbtn p" id="ovLBBtn" style="background:linear-gradient(135deg,#ff00aa,#bf00ff);">🏆 Scores</button>
        <button class="ovbtn s" id="ovMenuBtn">← Menu</button>
      </div>
      <div id="qr-wrap" style="display:none;flex-direction:column;align-items:center;gap:4px;">
        <div style="font-family:'Fredoka One',cursive;font-size:.75rem;color:#666;">📲 Stuur door!</div>
        <div id="qrcode"></div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ══ UTILS ══
const $ = id => document.getElementById(id);
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}
function showToast(msg,dur=2500){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

// ══ SUPABASE ══
const SB_URL='https://pxfivcolrwgduyptueim.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4Zml2Y29scndnZHV5cHR1ZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Mjc1NDAsImV4cCI6MjA5MzIwMzU0MH0.QNpd5rSgSOEMbJ_5TbkBy6k7RSVs2nkID6c09OJBzKY';
async function sbFetch(path,method='GET',body=null){
  try{
    const r=await fetch(SB_URL+path,{method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''},body:body?JSON.stringify(body):null});
    if(!r.ok)return null;return r.json();
  }catch(e){return null;}
}
const DB={
  users(){try{return JSON.parse(localStorage.getItem('br_u')||'{}')}catch{return{}}},
  saveUsers(u){localStorage.setItem('br_u',JSON.stringify(u));},
  localScores(){try{return JSON.parse(localStorage.getItem('br_s')||'[]')}catch{return[]}},
  cacheScore(e){let s=this.localScores();s.push(e);s.sort((a,b)=>b.score-a.score);s=s.slice(0,50);localStorage.setItem('br_s',JSON.stringify(s));},
  async pushScore(e){
    this.cacheScore(e);
    await sbFetch('/rest/v1/Scores','POST',{"User":e.user,"Score":e.score,"Level":e.level,"Beers":e.beers,"Strip_Visits":e.strips||0,"Day":e.day||'','Date':e.date||''});
  },
  async getGlobal(n=20){
    const d=await sbFetch('/rest/v1/Scores?select=*&order=Score.desc&limit='+n);
    if(d&&d.length)return d.map(r=>({user:r.User,score:r.Score,level:r.Level,beers:r.Beers,strips:r.Strip_Visits,day:r.Day}));
    return this.localScores();
  },
  async getMine(u,n=20){
    const d=await sbFetch('/rest/v1/Scores?select=*&User=eq.'+encodeURIComponent(u)+'&order=Score.desc&limit='+n);
    if(d)return d.map(r=>({user:r.User,score:r.Score,level:r.Level,beers:r.Beers,strips:r.Strip_Visits,day:r.Day}));
    return this.localScores().filter(s=>s.user===u);
  }
};

// ══ AUTH ══
let CU=null, ctab='in';
function switchTab(t){
  ctab=t;
  $('tabIn').classList.toggle('on',t==='in');
  $('tabReg').classList.toggle('on',t==='reg');
  $('cIn').style.display=t==='reg'?'block':'none';
  $('authBtn').textContent=t==='in'?'SPEEL!':'REGISTREER';
  $('lmsg').textContent='';
}
function doAuth(){
  const u=$('uIn').value.trim(),p=$('pIn').value,c=$('cIn').value;
  const msg=$('lmsg');
  if(!u||!p){msg.className='lmsg err';msg.textContent='Vul alles in!';return;}
  const users=DB.users();
  if(ctab==='reg'){
    if(p!==c){msg.className='lmsg err';msg.textContent='Wachtwoorden komen niet overeen!';return;}
    if(p.length<4){msg.className='lmsg err';msg.textContent='Minimaal 4 tekens!';return;}
    if(users[u]){msg.className='lmsg err';msg.textContent='Naam al bezet!';return;}
    users[u]={pw:btoa(p)};DB.saveUsers(users);
    msg.className='lmsg ok';msg.textContent='Aangemaakt! Log nu in.';switchTab('in');return;
  }
  if(!users[u]||users[u].pw!==btoa(p)){msg.className='lmsg err';msg.textContent='Onjuiste gegevens!';return;}
  CU=u;$('mwelcome').textContent='Welkom, '+u+'! 🍺';showScreen('menuScreen');
}
$('pIn').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
$('uIn').addEventListener('keydown',e=>{if(e.key==='Enter')$('pIn').focus();});

// Menu buttons
$('playBtn').onclick=()=>startGame(1);
$('logoutBtn').onclick=()=>{CU=null;showScreen('loginScreen');};
$('scoreBtn').onclick=()=>goScore();
$('scoreBackBtn').onclick=()=>showScreen('menuScreen');
$('stab0').onclick=()=>{$('stab0').classList.add('on');$('stab1').classList.remove('on');renderScores('mine');};
$('stab1').onclick=()=>{$('stab1').classList.add('on');$('stab0').classList.remove('on');renderScores('global');};

async function goScore(){showScreen('scoreScreen');renderScores('mine');}
async function renderScores(mode){
  const body=$('scoreBody');
  body.innerHTML='<tr><td colspan="6" style="text-align:center;color:#555;padding:16px;font-family:Fredoka One,cursive">⏳ Laden...</td></tr>';
  const scores=mode==='mine'?await DB.getMine(CU):await DB.getGlobal();
  body.innerHTML='';
  if(!scores.length){body.innerHTML='<tr><td colspan="6" style="text-align:center;color:#333;padding:16px">Nog geen scores 🍺</td></tr>';return;}
  scores.forEach((s,i)=>{
    const tr=document.createElement('tr');
    tr.className=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const isYou=s.user===CU;
    if(isYou)tr.style.background='rgba(0,245,255,.05)';
    tr.innerHTML='<td>'+(i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1)+'</td>'
      +'<td>'+s.user+(isYou?'<span class="you-badge">jij</span>':'')+'</td>'

let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,d,t='sine',v=.14,delay=0){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.setValueAtTime(f,a.currentTime+delay);o.frequency.exponentialRampToValueAtTime(f*.5,a.currentTime+delay+d);g.gain.setValueAtTime(v,a.currentTime+delay);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+delay+d);o.start(a.currentTime+delay);o.stop(a.currentTime+delay+d);}catch(e){}
}
const snd={
  beer:()=>{tone(600,.08);tone(500,.08,'sine',.1,.09);tone(700,.12,'sine',.1,.18);},
  coin:()=>{tone(800,.06);tone(1200,.1,'sine',.12,.07);},
  alert:()=>{tone(880,.15,'square',.18);tone(660,.15,'square',.18,.18);},
  death:()=>{for(let i=0;i<5;i++)tone(400-i*60,.2,'square',.2,i*.18);},
  levelup:()=>{[400,500,600,800].forEach((f,i)=>tone(f,.15,'sine',.2,i*.12));},
  strip:()=>{for(let i=0;i<4;i++)tone(300+i*200,.1,'sawtooth',.12,i*.1);},
  puke:()=>{tone(200,.4,'sawtooth',.3);tone(150,.3,'sawtooth',.25,.3);},
};
let droneO=null,droneG=null;
function droneStart(){try{const a=ac();droneG=a.createGain();droneG.gain.value=0;droneG.connect(a.destination);droneO=a.createOscillator();droneO.type='sawtooth';droneO.frequency.value=60;droneO.connect(droneG);droneO.start();}catch(e){}}
function droneSet(v){if(!droneG)return;try{droneG.gain.setTargetAtTime(v*.06,AC.currentTime,.5);}catch(e){}}
function droneStop(){try{droneO&&droneO.stop();droneO=null;droneG=null;}catch(e){}}

const COLS=MB[0].length,ROWS=MB.length;

function freshMaze(){
  const m=MB.map(r=>[...r]);
  // Place beers at corners of inner paths
  [[2,1],[18,1],[2,19],[18,19],[1,6],[19,6],[1,14],[19,14]].forEach(([x,y])=>{if(m[y][x]===1)m[y][x]=3;});
  return m;
}

function isWall(maze,tx,ty){
  if(tx<0||ty<0||tx>=COLS||ty>=ROWS)return false; // tunnel = not wall
  return maze[ty][tx]===0;
}

function emptyCells(maze){
  const c=[];
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(maze[y][x]===2)c.push({x,y});
  return c;
}
function randCell(maze,minDist=0){
  const px=G.player?Math.round(G.player.x/G.cell):10;
  const py=G.player?Math.round(G.player.y/G.cell):16;
  const cells=emptyCells(maze).filter(c=>Math.abs(c.x-px)+Math.abs(c.y-py)>=minDist);
  return cells.length?cells[Math.floor(Math.random()*cells.length)]:null;
}

function initGame(level,carryBeers=0){
  const canvas=$('gc');

    drunkPhase:0, speedMult:1.0,
    puking:false, pukeTimer:0, vomitTimer:0,
    lives:3,
    player:{
      x:(10*cell)+(cell/2), y:(16*cell)+(cell/2),
      dir:[0,0], nextDir:[1,0],
      mouthOpen:true, mouthTimer:0,
      dead:false, deathTimer:0,
      invincTimer:0,
      ontbijtTimer:0,
      atStripper:false, stripTimer:0,
    },

  db.textContent=day.emoji+' '+day.name+' — '+day.desc;

function spawnSecurity(level,day){
  const count=1+Math.floor((level-1)/10);
  // Security starts at ~50% of Dimitri's speed (3.68), grows 2% per level
  // Level 1 = 1.85*cell, Level 10 = ~2.2*cell  — always slower than Dimitri (3.68)
  // Day multiplier further adjusts (Maandag=0.75 → very slow, Vrijdag=1.4 → faster)
  const baseSpeed=(1.85*(1+(level-1)*.02))*G.cell*day.sm;
  const starts=[{x:9,y:9},{x:11,y:9},{x:9,y:11},{x:11,y:11}];
  // Step interval: how often security takes a step (lower = more responsive/faster)
  // Start slow, get slightly faster each level
  const stepInterval=Math.max(.15,.35-level*.02);
  for(let i=0;i<count;i++){
    const s=starts[i%4];
    G.securities.push({x:s.x*G.cell+G.cell/2,y:s.y*G.cell+G.cell/2,dir:[1,0],speed:baseSpeed,stepT:0,stepI:stepInterval,color:['#e74c3c','#3498db','#2ecc71','#e67e22'][i%4],frozen:false,frozenT:0,heartT:0});
  }
}

function spawnOntbijt(){
  for(let i=0;i<2;i++){
    const p=randCell(G.maze,4);
    if(p)G.ontbijt.push({x:p.x,y:p.y});
  }
}

// ══ LOOP ══
function loop(ts){
  if(!G.ctx)return;
  const dt=Math.min((ts-(G.lastTime||ts))/1000,.05);
  G.lastTime=ts;
  if(!G.paused&&!G.gameOver&&!G.won){
    update(dt);
    draw();
  }
  if(!G.gameOver&&!G.won)RAF=requestAnimationFrame(loop);
}

// ══ UPDATE ══
function update(dt){
  G.pelletT+=dt;
  G.scoreTimer+=dt;
  if(G.scoreTimer>=1){G.scoreTimer-=1;G.score+=Math.round(1*(1+(G.level-1)*.05));G.timeScore=(G.timeScore||0)+1;updateHUD();}

  const p=G.player;
  if(p.dead){p.deathTimer-=dt;if(p.deathTimer<=0){if(G.lives<=0){doGameOver();return;}respawn();}return;}
  if(G.puking){G.pukeTimer-=dt;G.vomitTimer-=dt;if(G.pukeTimer<=0)endPuke();return;}
  if(p.invincTimer>0)p.invincTimer-=dt;
  if(p.ontbijtTimer>0)p.ontbijtTimer-=dt;
  if(p.atStripper){p.stripTimer-=dt;if(p.stripTimer<=0)finishStrip();return;}

  movePlayer(dt);
  moveSecurity(dt);
  checkHits();
  updateCoins(dt);
  updateIjs(dt);
  updateWC(dt);
  droneSet(G.drunkBeers/G.pukeAt);
}

// ══ DRUNK ══
function calcSM(){
  const db=G.drunkBeers,sl=G.slowStart;
  if(db<sl||db>=G.pukeAt)return 1.0;
  const range=G.pukeAt-sl;
  return 1.0-Math.min(1,(db-sl)/range)*.10;
}
function calcDP(){
  const db=G.drunkBeers;
  if(db>=G.invertStart&&db<G.pukeAt)return 2;
  if(db>=G.slowStart&&db<G.pukeAt)return 1;
  return 0;
}
function drinkBeer(){
  G.beers++;G.drunkBeers++;
  G.speedMult=calcSM();G.drunkPhase=calcDP();
  updateDrunkBar();
  if(G.drunkBeers>=G.pukeAt&&!G.puking)startPuke();
  triggerWC();
}
function startPuke(){
  G.puking=true;G.pukeTimer=2.5;G.vomitTimer=2.5;
  const pts=75;G.score+=pts;snd.puke();
  pop(pts,Math.floor(G.player.x/G.cell),Math.floor(G.player.y/G.cell),'#00ff88');
  showToast('🤮 KOTSEN! +75 punten!',3000);
}
function endPuke(){
  G.puking=false;G.vomitTimer=0;G.drunkBeers=0;G.speedMult=1.0;G.drunkPhase=0;
  updateDrunkBar();updateHUD();showToast('😅 Nuchter! Nieuwe ronde!');
}
function updateDrunkBar(){
  const pct=Math.min(100,G.drunkBeers/G.pukeAt*100);
  $('dbFill').style.width=pct+'%';
  $('dbFill').style.background='rgb('+Math.floor(pct*2.55)+','+Math.floor((100-pct)*2.55)+',30)';
  $('hDrunk').textContent=Math.round(pct)+'%';
}

// ══ MOVEMENT ══
function movePlayer(dt){
  const p=G.player,cell=G.cell;
  let spd=3.68*cell*dt; // Dimitri ~15% faster than base security (3.2*1.15=3.68)
  spd*=G.speedMult;
  if(p.ontbijtTimer>0)spd*=1.20;

  p.mouthTimer+=dt;if(p.mouthTimer>.18){p.mouthOpen=!p.mouthOpen;p.mouthTimer=0;}

  // tile coords (centre-based)
  const tx=Math.floor(p.x/cell);
  const ty=Math.floor(p.y/cell);
  const cx=tx*cell+cell/2; // tile centre x
  const cy=ty*cell+cell/2; // tile centre y

  // Apply drunk inversion to input
  const nd=G.drunkPhase>=2?[-p.nextDir[0],-p.nextDir[1]]:[...p.nextDir];

  // Try to turn when close to tile centre
  const snap=Math.max(spd+1, cell*.3);
  if(nd[0]!==0 && Math.abs(p.y-cy)<snap){
    const ntx=tx+nd[0];
    if(!isWall(G.maze,ntx,ty)){p.dir=[nd[0],0];p.y=cy;}
  }
  if(nd[1]!==0 && Math.abs(p.x-cx)<snap){
    const nty=ty+nd[1];
    if(!isWall(G.maze,tx,nty)){p.dir=[0,nd[1]];p.x=cx;}
  }

  // Move
  if(p.dir[0]!==0||p.dir[1]!==0){
    const nx=p.x+p.dir[0]*spd;
    const ny=p.y+p.dir[1]*spd;
    const ftx=Math.floor(nx/cell);
    const fty=Math.floor(ny/cell);
    if(!isWall(G.maze,ftx,fty)){p.x=nx;p.y=ny;}
    else{
      if(p.dir[0]!==0)p.x=Math.floor(p.x/cell)*cell+cell/2;
      if(p.dir[1]!==0)p.y=Math.floor(p.y/cell)*cell+cell/2;
      p.dir=[0,0];
    }
  }

  // Tunnel wrap — row 10 is the tunnel row
  if(p.x < -cell*0.5) p.x = (COLS-1)*cell + cell*0.5;
  if(p.x > (COLS-1)*cell + cell*0.5) p.x = -cell*0.5;

  eat(Math.floor(p.x/cell),Math.floor(p.y/cell));
}

function eat(gx,gy){
  if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return;
  const m=G.maze;
  if(m[gy][gx]===1){
    m[gy][gx]=2;G.money+=1;G.score+=1;updateHUD();checkWin();
  }
  if(m[gy][gx]===3){
    m[gy][gx]=2;drinkBeer();G.money+=5;
    const pts=Math.round(20*(1+(G.level-1)*.05));G.score+=pts;
    snd.beer();pop(pts,gx,gy,'#F5A623');updateHUD();
    showToast('🍺 Biertje #'+G.drunkBeers+'! '+drunkMsg(),1800);checkWin();
  }
  // coins
  for(let i=G.coins.length-1;i>=0;i--){
    if(G.coins[i].x===gx&&G.coins[i].y===gy){
      G.coins.splice(i,1);G.money+=25;
      const pts=Math.round(5*(1+(G.level-1)*.05));G.score+=pts;
      snd.coin();pop(pts,gx,gy,'#FFD700');showToast('💰 +€25!',1500);updateHUD();
      maybeSpawnStrip();
    }
  }
  // ontbijt
  for(let i=G.ontbijt.length-1;i>=0;i--){
    if(G.ontbijt[i].x===gx&&G.ontbijt[i].y===gy){
      G.ontbijt.splice(i,1);G.player.ontbijtTimer=15;
      showToast('🥐 +20% snelheid 15s!',2000);tone(500,.4,'sine',.2);
    }
  }
  // stripper
  for(let i=G.strippers.length-1;i>=0;i--){
    const s=G.strippers[i];
    if(s.x===gx&&s.y===gy){
      if(G.money>=G.stripCost){
        G.player.atStripper=true;G.player.stripTimer=2;G.player.stripIdx=i;
        showToast('💃 Verliefd... ❤️',2000);snd.strip();
      } else showToast('💃 €'+G.stripCost+' nodig (heb €'+G.money+')',2000);
    }
  }
  // wc
  if(G.wc&&G.wc.x===gx&&G.wc.y===gy&&G.wcNeeded){
    G.wcNeeded=false;G.wc=null;$('wcAlert').classList.remove('show');
    showToast('🚽 Op tijd! Opluchting!',2000);tone(600,.3,'sine',.2);
  }
  // ijs
  for(let i=G.ijs.length-1;i>=0;i--){
    const ij=G.ijs[i];
    if(ij.x===gx&&ij.y===gy){
      G.ijs.splice(i,1);
      const pts=Math.round(50*(1+(G.level-1)*.05));G.score+=pts;
      pop(pts,gx,gy,'#ff4');
      if(G.lives<3){G.lives++;updateLives();showToast('🎆 +50pts & +1 ID! Extra security '+(15+G.level-1)+'s',3000);}
      else showToast('🎆 +50pts! Extra security '+(15+G.level-1)+'s!',2500);
      spawnExtraSec();snd.strip();
    }
  }
  // bed
  if(G.bed&&G.bed.x===gx&&G.bed.y===gy)doWin();
}

function drunkMsg(){
  const db=G.drunkBeers;
  if(db<G.slowStart)return'🟢';
  if(db<G.invertStart)return'🟡 '+(Math.round((1-G.speedMult)*100))+'% trager';
  if(db<G.pukeAt)return'🔴 OMGEKEERD!';
  return'💀 KOTSEN!';
}

// ══ STRIPPER ══
function finishStrip(){
  const idx=G.player.stripIdx||0;
  if(G.strippers[idx])G.strippers.splice(idx,1);
  G.player.atStripper=false;G.player.stripIdx=null;
  G.money-=G.stripCost;G.stripCost+=50;G.strips++;
  const pts=Math.round(100*(1+(G.level-1)*.05));G.score+=pts;
  pop(pts,Math.floor(G.player.x/G.cell),Math.floor(G.player.y/G.cell),'#ff88dd');
  showToast('💃 +'+pts+'pts! Security 5s weg! Volgende: €'+G.stripCost,3500);
  // Freeze all, respawn far
  const freeze=s=>{s.frozen=true;s.frozenT=5;};
  G.securities.forEach(freeze);if(G.extraSec)freeze(G.extraSec);
  setTimeout(()=>{
    G.securities.forEach(s=>{const p=randCell(G.maze,7);if(p){s.x=p.x*G.cell+G.cell/2;s.y=p.y*G.cell+G.cell/2;}s.frozen=false;});
    if(G.extraSec){const p=randCell(G.maze,7);if(p){G.extraSec.x=p.x*G.cell+G.cell/2;G.extraSec.y=p.y*G.cell+G.cell/2;}G.extraSec.frozen=false;}
  },5000);
  updateHUD();maybeSpawnStrip();
}
function maybeSpawnStrip(){
  if(G.money>=G.stripCost&&G.strippers.length===0){
    const p=randCell(G.maze,6);if(p){G.strippers.push({x:p.x,y:p.y});showToast('💃 Stripper verschijnt! Je hebt €'+G.money,2500);}
  }
}

// ══ COINS ══
function updateCoins(dt){
  G.coinTimer-=dt;
  if(G.coinTimer<=0){
    G.coinTimer=6+Math.random()*7;
    const p=randCell(G.maze,3);if(p)G.coins.push({x:p.x,y:p.y,t:30});
  }
  for(let i=G.coins.length-1;i>=0;i--){G.coins[i].t-=dt;if(G.coins[i].t<=0)G.coins.splice(i,1);}
}

// ══ IJSFONTEIN ══
function updateIjs(dt){
  G.ijsTimer-=dt;
  if(G.ijsTimer<=0&&G.ijs.length<2){
    G.ijsTimer=12+Math.random()*10;
    const p=randCell(G.maze,5);if(p)G.ijs.push({x:p.x,y:p.y});
  }
}
function spawnExtraSec(){
  const dur=15+(G.level-1);G.extraSecTimer=dur;
  const p=randCell(G.maze,6);
  // Extra security also capped — faster than normal but not unfair
  const extraSpd=(2.2+(G.level-1)*.04)*G.cell;
  G.extraSec={x:(p?p.x:10)*G.cell+G.cell/2,y:(p?p.y:11)*G.cell+G.cell/2,dir:[0,1],speed:extraSpd,stepT:0,stepI:Math.max(.12,.28-G.level*.01),color:'#ff0000',frozen:false,frozenT:0,heartT:0,extra:true};
}

// ══ WC ══
function triggerWC(){
  if(G.drunkBeers<40||G.wcNeeded)return;
  G.wcNeeded=true;G.wcTimer=25;

}
function updateWC(dt){
  if(!G.wcNeeded)return;
  G.wcTimer-=dt;
  $('wcSec').textContent=Math.ceil(Math.max(0,G.wcTimer));
  if(G.wcTimer<=8&&Math.floor(G.wcTimer*3)%2===0)snd.alert();
  if(G.wcTimer<=0){

    G.peePuddle={x:G.player.x,y:G.player.y,t:4};

}

// ══ SECURITY AI ══
function moveSecurity(dt){
  const all=G.extraSec?[...G.securities,G.extraSec]:G.securities;
  all.forEach(s=>{
    if(s.heartT>0)s.heartT-=dt;
    if(s.frozen){s.frozenT-=dt;if(s.frozenT<=0)s.frozen=false;return;}
    s.stepT-=dt;if(s.stepT>0)return;
    s.stepT=s.stepI;
    const px=Math.floor(G.player.x/G.cell),py=Math.floor(G.player.y/G.cell);
    const sx=Math.floor(s.x/G.cell),sy=Math.floor(s.y/G.cell);
    const dx=px-sx,dy=py-sy;
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    let best=null,bs=-Infinity;
    dirs.forEach(d=>{
      const nx=sx+d[0],ny=sy+d[1];
      if(isWall(G.maze,nx,ny))return;
      if(d[0]===-s.dir[0]&&d[1]===-s.dir[1]&&best)return;
      // Mostly follow player, small random factor to avoid perfect tracking
      const sc=d[0]*dx+d[1]*dy+(Math.random()<.15?Math.random()*1.5:0);
      if(sc>bs){bs=sc;best=d;}
    });
    if(!best)return;
    // Check stripper
    const onStrip=G.strippers.some(st=>st.x===sx+best[0]&&st.y===sy+best[1]);
    if(onStrip){s.heartT=4;s.frozen=true;s.frozenT=4;}
    s.dir=best;s.x=(sx+best[0])*G.cell+G.cell/2;s.y=(sy+best[1])*G.cell+G.cell/2;
    s.x=Math.max(G.cell/2,Math.min(s.x,(COLS-1)*G.cell+G.cell/2));
    s.y=Math.max(G.cell/2,Math.min(s.y,(ROWS-1)*G.cell+G.cell/2));
  });
  if(G.extraSec){G.extraSecTimer-=dt;if(G.extraSecTimer<=0){G.extraSec=null;showToast('✅ Extra security weg!',1500);}}
}

function checkHits(){
  const p=G.player;
  if(p.dead||p.invincTimer>0||p.atStripper)return;
  const thr=G.cell*.6;
  const all=G.extraSec?[...G.securities,G.extraSec]:G.securities;
  for(const s of all){
    if(s.frozen)continue;
    if(Math.abs(s.x-p.x)<thr&&Math.abs(s.y-p.y)<thr){
      G.lives--;updateLives();p.dead=true;p.deathTimer=1.2;p.invincTimer=3;
      snd.death();showToast('🚫 Gepakt! '+G.lives+' ID'+(G.lives===1?'':'s')+' over!',2000);
      if(G.lives<=0)setTimeout(()=>doGameOver(),1500);
      return;
    }
  }
}

function respawn(){
  const p=G.player;
  p.dead=false;p.x=10*G.cell+G.cell/2;p.y=16*G.cell+G.cell/2;
  p.dir=[0,0];p.nextDir=[1,0];
}

// ══ WIN / LOSE ══
function checkWin(){
  let rem=0;
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(G.maze[y][x]===1||G.maze[y][x]===3)rem++;
  if(rem===0&&!G.bed){
    const p=randCell(G.maze,4)||{x:10,y:10};
    G.bed={x:p.x,y:p.y};showToast('🛏️ Vind het bed!',3000);
  }
}

// ══ DRAWING ══
function draw(){
  const c=G.ctx,cell=G.cell,W=G.canvas.width,H=G.canvas.height;
  c.clearRect(0,0,W,H);

  // Drunk wobble
  c.save();
  if(G.drunkPhase>=1){
    const wobble=Math.sin(G.pelletT*3)*(G.drunkBeers/G.pukeAt)*3*(Math.PI/180);
    c.translate(W/2,H/2);c.rotate(wobble);c.translate(-W/2,-H/2);
  }

  // BG
  c.fillStyle='#050010';c.fillRect(0,0,W,H);

  // Vomit
  if(G.vomitTimer>0){
    const a=Math.min(.7,G.vomitTimer*.3);
    c.fillStyle='rgba(80,180,20,'+a+')';c.fillRect(0,0,W,H);
    c.font='bold '+Math.floor(cell*1.3)+'px Arial';c.textAlign='center';c.textBaseline='middle';
    c.fillStyle='rgba(255,255,255,'+(a+.2)+')';c.fillText('🤮 KOTSEN! 🤮',W/2,H/2);
  }

  // Pee
  if(G.peePuddle){
    G.peePuddle.t-=.016;const pp=G.peePuddle;
    const a=Math.min(.85,pp.t*.25);
    c.save();c.globalAlpha=a;
    const pg=c.createRadialGradient(pp.x,pp.y,2,pp.x,pp.y,cell*2.5);
    pg.addColorStop(0,'rgba(230,210,0,.9)');pg.addColorStop(.5,'rgba(180,160,0,.6)');pg.addColorStop(1,'rgba(100,90,0,0)');
    c.fillStyle=pg;c.beginPath();c.ellipse(pp.x,pp.y,cell*2.4,cell*1.5,.3,0,Math.PI*2);c.fill();
    c.font=cell+'px Arial';c.textAlign='center';c.textBaseline='middle';c.fillText('💦',pp.x,pp.y-cell*.7);
    c.restore();if(pp.t<=0)G.peePuddle=null;
  }

  // Maze
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const v=G.maze[y][x],px=x*cell,py=y*cell;
      if(v===0){
        c.fillStyle='#0a0030';c.fillRect(px,py,cell,cell);
        c.strokeStyle='rgba(0,245,255,.22)';c.lineWidth=.7;c.strokeRect(px+.5,py+.5,cell-1,cell-1);
      } else if(v===1){
        const p=.55+.45*Math.sin(G.pelletT*4+x*.7+y*.5);
        c.fillStyle='rgba(180,180,255,'+p+')';c.beginPath();c.arc(px+cell/2,py+cell/2,Math.max(2,cell*.1),0,Math.PI*2);c.fill();
      } else if(v===3){
        drawBeer(c,px,py,cell);
      }
    }
  }

  // Tunnel arrows on row 10 sides
  const tr=10;
  c.save();c.fillStyle='rgba(0,245,255,0.5)';c.font='bold '+Math.floor(cell*.55)+'px Arial';c.textAlign='center';c.textBaseline='middle';
  c.fillText('◀',cell*.3,tr*cell+cell/2);
  c.fillText('▶',(COLS-1)*cell+cell*.7,tr*cell+cell/2);
  c.restore();

  // Ontbijt
  G.ontbijt.forEach(o=>{
    const cx=o.x*cell+cell/2,cy=o.y*cell+cell/2;
    c.fillStyle='rgba(100,255,100,'+(0.25+.15*Math.sin(G.pelletT*3))+')';
    c.beginPath();c.arc(cx,cy,cell*.45,0,Math.PI*2);c.fill();
    c.font=Math.floor(cell*.6)+'px Arial';c.textAlign='center';c.textBaseline='middle';c.fillText('🥐',cx,cy);
  });

  // Coins
  G.coins.forEach(co=>{
    const cx=co.x*cell+cell/2,cy=co.y*cell+cell/2;
    const urgent=co.t<8;
    c.save();c.globalAlpha=urgent?(Math.sin(G.pelletT*10)*.4+.6):.9;
    const cg=c.createRadialGradient(cx-cell*.1,cy-cell*.1,1,cx,cy,cell*.36);
    cg.addColorStop(0,'#fff8a0');cg.addColorStop(.5,'#FFD700');cg.addColorStop(1,'#b8860b');
    c.fillStyle=cg;c.beginPath();c.arc(cx,cy,cell*.33,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(80,50,0,.9)';c.font='bold '+Math.floor(cell*.26)+'px Arial';c.textAlign='center';c.textBaseline='middle';c.fillText('€',cx,cy);
    c.restore();
  });

  // Ijs
  G.ijs.forEach(ij=>{
    const cx=ij.x*cell+cell/2,cy=ij.y*cell+cell/2,t=G.pelletT;
    const cols=['#ff4','#f80','#ff0080','#fff','#0ff'];
    for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2,l=cell*.36*(.65+.35*Math.sin(t*4+i));c.strokeStyle=cols[i%cols.length];c.lineWidth=2;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+Math.cos(a)*l,cy+Math.sin(a)*l);c.stroke();}
    c.fillStyle='rgba(255,255,255,.9)';c.beginPath();c.arc(cx,cy,cell*.1,0,Math.PI*2);c.fill();
    c.font=Math.floor(cell*.32)+'px Arial';c.textAlign='center';c.textBaseline='middle';c.fillText('🎆',cx,cy+cell*.42);
  });

  // Strippers
  G.strippers.forEach(s=>drawStripper(c,s.x*cell,s.y*cell,cell));

  // WC
  if(G.wc){
    const cx=G.wc.x*cell+cell/2,cy=G.wc.y*cell+cell/2;
    if(G.wcNeeded){c.fillStyle='rgba(255,0,170,'+(0.3+.3*Math.sin(G.pelletT*8))+')';c.beginPath();c.arc(cx,cy,cell*.5,0,Math.PI*2);c.fill();}
    c.font=Math.floor(cell*.65)+'px Arial';c.textAlign='center';c.textBaseline='middle';c.fillText('🚽',cx,cy);
  }

  // Bed
  if(G.bed){
    const cx=G.bed.x*cell+cell/2,cy=G.bed.y*cell+cell/2;
    c.fillStyle='rgba(0,245,255,'+(0.2+.15*Math.sin(G.pelletT*3))+')';c.beginPath();c.arc(cx,cy,cell*.5,0,Math.PI*2);c.fill();
    c.font=Math.floor(cell*.65)+'px Arial';c.textAlign='center';c.textBaseline='middle';c.fillText('🛏️',cx,cy);
  }

  // Player
  const p=G.player;
  if(!p.dead||Math.floor(G.pelletT*8)%2===0){
    drawDimitri(c,p.x,p.y,cell,G.drunkPhase>=2&&!G.puking?[-p.dir[0],-p.dir[1]]:p.dir,G.drunkPhase,p.mouthOpen,G.puking,p.ontbijtTimer>0);
    if(p.atStripper){c.font=Math.floor(cell*.8)+'px Arial';c.textAlign='center';c.textBaseline='middle';c.fillText('❤️',p.x,p.y-cell*.7);}
  }

  // Securities
  G.securities.forEach(s=>drawSec(c,s.x,s.y,cell,s.frozen,false,s.color,s.heartT>0));
  if(G.extraSec)drawSec(c,G.extraSec.x,G.extraSec.y,cell,G.extraSec.frozen,true,G.extraSec.color,G.extraSec.heartT>0);

  // Warnings
  if(G.drunkPhase>=2&&!G.puking){
    c.save();c.font='bold '+Math.floor(cell*.6)+'px Bebas Neue,sans-serif';c.textAlign='center';
    c.fillStyle='rgba(255,80,0,'+(0.5+.5*Math.sin(G.pelletT*7))+')';c.fillText('⬅️ OMGEKEERD! ➡️',W/2,cell*1.2);c.restore();
  } else if(G.drunkPhase===1){
    c.save();c.font='bold '+Math.floor(cell*.55)+'px Bebas Neue,sans-serif';c.textAlign='center';
    c.fillStyle='rgba(255,200,0,'+(0.4+.4*Math.sin(G.pelletT*5))+')';c.fillText('🐢 '+Math.round((1-G.speedMult)*100)+'% LANGZAMER',W/2,cell*1.2);c.restore();
  }

  // Joystick
  drawJoy(c);
  c.restore();
}

// ══ SPRITES ══
function drawBeer(c,px,py,cell){
  const cx=px+cell/2,cy=py+cell/2,r=cell*.3;
  c.fillStyle='rgba(245,166,35,.9)';c.beginPath();c.roundRect(cx-r*.6,cy-r,r*1.2,r*1.9,r*.18);c.fill();
  c.fillStyle='rgba(255,255,255,.88)';c.beginPath();c.roundRect(cx-r*.6,cy-r,r*1.2,r*.55,[r*.18,r*.18,0,0]);c.fill();
  c.fillStyle='rgba(255,220,100,.45)';c.fillRect(cx-r*.18,cy-r*.35,r*.18,r*.85);
}

function drawDimitri(c,px,py,size,dir,drunk,mouthOpen,puking,fast){
  const cx=px,cy=py,r=size*.46;
  c.save();c.translate(cx,cy);
  let rot=0;if(dir[0]===1)rot=0;else if(dir[0]===-1)rot=Math.PI;else if(dir[1]===-1)rot=-Math.PI/2;else if(dir[1]===1)rot=Math.PI/2;
  c.rotate(rot);
  if(fast){c.shadowColor='#00ff88';c.shadowBlur=10;}
  const sR=Math.min(240,210+drunk*20),sG=Math.max(120,175-drunk*22),sB=Math.max(75,140-drunk*28);
  const skin='rgb('+sR+','+sG+','+sB+')';
  c.fillStyle=skin;c.beginPath();c.ellipse(0,r*.72,r*.28,r*.2,0,0,Math.PI*2);c.fill();
  const ma=mouthOpen?.30:.04;
  c.fillStyle=skin;c.beginPath();c.moveTo(0,0);c.arc(0,0,r,ma*Math.PI,(2-ma)*Math.PI);c.closePath();c.fill();
  c.fillStyle=skin;c.beginPath();c.ellipse(0,r*.52,r*.7,r*.3,0,0,Math.PI*2);c.fill();
  c.fillStyle='rgb('+(sR-12)+','+(sG-12)+','+(sB-10)+')';c.beginPath();c.ellipse(-r*.88,r*.04,r*.12,r*.17,-.2,0,Math.PI*2);c.fill();
  const hg=c.createRadialGradient(0,-r*.5,r*.08,0,-r*.38,r*.9);
  hg.addColorStop(0,'#d4b050');hg.addColorStop(.45,'#b88f28');hg.addColorStop(1,'#7a5518');
  c.fillStyle=hg;c.beginPath();c.ellipse(0,-r*.37,r*.82,r*.6,0,Math.PI,Math.PI*2);c.fill();
  c.strokeStyle='#cba848';c.lineWidth=r*.055;c.lineCap='round';
  [[-r*.3,-r*.87,-r*.28,-r*.99],[-r*.1,-r*.91,-r*.09,-r*1.04],[r*.1,-r*.9,r*.11,-r*1.02],[r*.3,-r*.84,r*.31,-r*.96]].forEach(([x1,y1,x2,y2])=>{c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();});
  c.strokeStyle='rgba(130,88,18,'+(drunk>=2?.5:1)+')';c.lineWidth=r*.085;c.lineCap='round';
  const by=-r*.24;
  c.beginPath();c.moveTo(-r*.54,by+(drunk>=2?r*.05:0));c.quadraticCurveTo(-r*.34,by-r*.06,-r*.17,by+(drunk>=2?r*.03:0));c.stroke();
  c.beginPath();c.moveTo(r*.17,by+(drunk>=2?r*.03:0));c.quadraticCurveTo(r*.34,by-r*.06,r*.54,by+(drunk>=2?r*.05:0));c.stroke();
  const ey=-r*.09;
  c.fillStyle='#f4f4f4';c.beginPath();c.ellipse(-r*.32,ey,r*.18,r*.12,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(r*.32,ey,r*.18,r*.12,0,0,Math.PI*2);c.fill();
  c.fillStyle='#4a7fa5';const eyH=drunk>=2?r*.07:drunk===1?r*.09:r*.1;
  c.beginPath();c.ellipse(-r*.32,ey,r*.105,eyH,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(r*.32,ey,r*.105,eyH,0,0,Math.PI*2);c.fill();
  c.fillStyle='#0d0d0d';c.beginPath();c.arc(-r*.32,ey,r*.06,0,Math.PI*2);c.fill();c.beginPath();c.arc(r*.32,ey,r*.06,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(255,255,255,.85)';c.beginPath();c.arc(-r*.27,ey-r*.04,r*.028,0,Math.PI*2);c.fill();c.beginPath();c.arc(r*.37,ey-r*.04,r*.028,0,Math.PI*2);c.fill();
  if(drunk>=1){c.fillStyle=skin;const dv=drunk===2?r*.09:r*.045;c.beginPath();c.ellipse(-r*.32,ey-eyH*.3,r*.18,dv,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(r*.32,ey-eyH*.3,r*.18,dv,0,0,Math.PI*2);c.fill();}
  if(drunk>=1){c.fillStyle='rgba(220,55,55,'+(drunk===1?.22:.38)+')';c.beginPath();c.ellipse(-r*.5,r*.14,r*.22,r*.16,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(r*.5,r*.14,r*.22,r*.16,0,0,Math.PI*2);c.fill();}
  if(drunk>=2){const t=Date.now()/550;c.font=Math.floor(r*.27)+'px Arial';c.textAlign='center';c.textBaseline='middle';for(let i=0;i<3;i++){const a=t+i*(Math.PI*2/3);c.fillText('⭐',Math.cos(a)*r*1.1,Math.sin(a)*r*1.08-r*.08);}}
  if(mouthOpen){c.fillStyle='#ddd';c.beginPath();c.arc(0,0,r*.52,ma*Math.PI*.75,(ma+.22)*Math.PI);c.arc(0,0,r*.28,(ma+.22)*Math.PI,ma*Math.PI*.75,true);c.closePath();c.fill();}
  else{c.strokeStyle='rgba('+(sR-38)+','+(sG-28)+','+(sB-18)+',.55)';c.lineWidth=r*.04;c.beginPath();c.arc(0,r*.28,r*.41,Math.PI*1.12,Math.PI*1.88);c.stroke();}
  if(puking){c.fillStyle='rgba(100,200,20,.9)';c.beginPath();c.arc(r*.3,r*.5,r*.18,0,Math.PI*2);c.fill();c.beginPath();c.arc(r*.55,r*.72,r*.12,0,Math.PI*2);c.fill();}
  c.restore();
}

function drawSec(c,px,py,sz,frozen,extra,color,heart){
  const cx=px,cy=py,s=sz*.88;
  c.save();if(frozen&&!heart)c.globalAlpha=.5;
  c.fillStyle=extra?'#6a0000':frozen?'#334':color;c.beginPath();c.ellipse(cx,cy+s*.12,s*.29,s*.37,0,0,Math.PI*2);c.fill();
  c.fillStyle=frozen?'#667':'#f3c49a';c.beginPath();c.arc(cx,cy-s*.22,s*.21,0,Math.PI*2);c.fill();
  c.fillStyle=extra?'#800':'#1a1a2e';c.fillRect(cx-s*.22,cy-s*.43,s*.44,s*.09);c.fillRect(cx-s*.16,cy-s*.53,s*.32,s*.11);
  if(!frozen||heart){c.fillStyle='#fff';c.beginPath();c.arc(cx-s*.08,cy-s*.22,s*.055,0,Math.PI*2);c.fill();c.beginPath();c.arc(cx+s*.08,cy-s*.22,s*.055,0,Math.PI*2);c.fill();c.fillStyle='#111';c.beginPath();c.arc(cx-s*.07,cy-s*.22,s*.028,0,Math.PI*2);c.fill();c.beginPath();c.arc(cx+s*.07,cy-s*.22,s*.028,0,Math.PI*2);c.fill();}
  c.fillStyle='#FFD700';c.font='bold '+Math.floor(s*.21)+'px Arial';c.textAlign='center';c.textBaseline='middle';c.fillText('V',cx,cy+s*.04);
  c.strokeStyle=extra?'#600':'#1a1a2e';c.lineWidth=Math.max(2,s*.085);c.lineCap='round';
  c.beginPath();c.moveTo(cx-s*.27,cy);c.lineTo(cx-s*.41,cy+s*.18);c.stroke();c.beginPath();c.moveTo(cx+s*.27,cy);c.lineTo(cx+s*.41,cy+s*.18);c.stroke();
  if(extra){c.fillStyle='#ff4444';c.font='bold '+Math.floor(s*.16)+'px Arial';c.fillText('!!',cx,cy-s*.5);}
  if(heart){c.font=Math.floor(s*.55)+'px Arial';c.fillText('❤️',cx,cy-s*.65);}
  else if(frozen){c.font=Math.floor(s*.4)+'px Arial';c.fillText('❄️',cx,cy-s*.6);}
  c.restore();
}

function drawStripper(c,px,py,sz){
  const cx=px+sz/2,cy=py+sz/2,t=G.pelletT;
  const hue=(t*50)%360;
  const grd=c.createRadialGradient(cx,cy,sz*.05,cx,cy,sz*.55);
  grd.addColorStop(0,'hsla('+hue+',100%,70%,.42)');grd.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=grd;c.beginPath();c.arc(cx,cy,sz*.55,0,Math.PI*2);c.fill();
  const sk='#f5c6a0';
  c.strokeStyle=sk;c.lineWidth=sz*.12;c.lineCap='round';
  c.beginPath();c.moveTo(cx-sz*.08,cy+sz*.2);c.bezierCurveTo(cx-sz*.18,cy+sz*.35,cx-sz*.22,cy+sz*.45,cx-sz*.16,cy+sz*.52);c.stroke();
  c.beginPath();c.moveTo(cx+sz*.08,cy+sz*.2);c.bezierCurveTo(cx+sz*.18,cy+sz*.35,cx+sz*.2,cy+sz*.45,cx+sz*.14,cy+sz*.52);c.stroke();
  c.fillStyle='#cc0066';c.fillRect(cx-sz*.2,cy+sz*.5,sz*.07,sz*.06);c.fillRect(cx+sz*.13,cy+sz*.5,sz*.07,sz*.06);
  c.fillStyle=sk;c.beginPath();c.ellipse(cx,cy+sz*.08,sz*.13,sz*.2,0,0,Math.PI*2);c.fill();
  c.fillStyle=sk;c.beginPath();c.ellipse(cx,cy+sz*.2,sz*.18,sz*.1,0,0,Math.PI*2);c.fill();
  c.fillStyle=sk;c.beginPath();c.ellipse(cx,cy-sz*.04,sz*.14,sz*.12,0,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(180,100,70,.35)';c.beginPath();c.ellipse(cx,cy-sz*.04,sz*.05,sz*.1,0,0,Math.PI*2);c.fill();
  c.strokeStyle=sk;c.lineWidth=sz*.085;
  c.beginPath();c.moveTo(cx-sz*.13,cy+sz*.02);c.bezierCurveTo(cx-sz*.28,cy-sz*.08,cx-sz*.38,cy-sz*.18,cx-sz*.42,cy-sz*.28);c.stroke();
  c.beginPath();c.moveTo(cx+sz*.13,cy+sz*.02);c.bezierCurveTo(cx+sz*.28,cy-sz*.08,cx+sz*.38,cy-sz*.18,cx+sz*.42,cy-sz*.28);c.stroke();
  c.fillStyle=sk;c.beginPath();c.arc(cx-sz*.44,cy-sz*.3,sz*.06,0,Math.PI*2);c.fill();c.beginPath();c.arc(cx+sz*.44,cy-sz*.3,sz*.06,0,Math.PI*2);c.fill();
  c.fillStyle=sk;c.beginPath();c.arc(cx,cy-sz*.3,sz*.13,0,Math.PI*2);c.fill();
  c.fillStyle='#8B0057';
  c.beginPath();c.moveTo(cx-sz*.13,cy-sz*.3);c.bezierCurveTo(cx-sz*.32,cy-sz*.15,cx-sz*.28,cy+sz*.08,cx-sz*.18,cy+sz*.18);c.lineTo(cx-sz*.04,cy-sz*.18);c.closePath();c.fill();
  c.beginPath();c.moveTo(cx+sz*.13,cy-sz*.3);c.bezierCurveTo(cx+sz*.32,cy-sz*.15,cx+sz*.28,cy+sz*.08,cx+sz*.18,cy+sz*.18);c.lineTo(cx+sz*.04,cy-sz*.18);c.closePath();c.fill();
  const lc='hsl('+((hue+120)%360)+',100%,62%)';
  c.fillStyle=lc;c.beginPath();c.moveTo(cx,cy-sz*.07);c.lineTo(cx-sz*.13,cy-sz*.16);c.lineTo(cx-sz*.03,cy-sz*.03);c.closePath();c.fill();
  c.beginPath();c.moveTo(cx,cy-sz*.07);c.lineTo(cx+sz*.13,cy-sz*.16);c.lineTo(cx+sz*.03,cy-sz*.03);c.closePath();c.fill();
  c.strokeStyle=lc;c.lineWidth=sz*.025;
  c.beginPath();c.moveTo(cx-sz*.07,cy-sz*.16);c.lineTo(cx-sz*.11,cy-sz*.3);c.stroke();
  c.beginPath();c.moveTo(cx+sz*.07,cy-sz*.16);c.lineTo(cx+sz*.11,cy-sz*.3);c.stroke();
  c.fillStyle=lc;c.beginPath();c.moveTo(cx-sz*.12,cy+sz*.18);c.lineTo(cx,cy+sz*.12);c.lineTo(cx+sz*.12,cy+sz*.18);c.closePath();c.fill();
  const canAff=G.money>=G.stripCost;
  c.fillStyle='rgba(0,0,0,.78)';c.beginPath();c.roundRect(cx-sz*.42,cy+sz*.56,sz*.84,sz*.2,4);c.fill();
  c.fillStyle=canAff?'#FFD700':'#ff6666';c.font='bold '+Math.floor(sz*.16)+'px Arial';c.textAlign='center';c.textBaseline='middle';
  c.fillText((canAff?'✓ ':'🔒 ')+'€'+G.stripCost,cx,cy+sz*.66);
}

// ══ JOYSTICK ══
const JOY={active:false,outerR:55,innerR:22,cx:0,cy:0,bx:0,by:0,dx:0,dy:0,pid:-1};
function drawJoy(c){
  const j=JOY,W=G.canvas.width,H=G.canvas.height;
  if(!j.active){j.cx=W-j.outerR-14;j.cy=H-j.outerR-14;j.bx=j.cx;j.by=j.cy;}
  c.save();
  c.globalAlpha=j.active?.52:.25;c.strokeStyle='#00f5ff';c.lineWidth=2;
  c.beginPath();c.arc(j.cx,j.cy,j.outerR,0,Math.PI*2);c.stroke();
  c.fillStyle='rgba(0,245,255,.06)';c.beginPath();c.arc(j.cx,j.cy,j.outerR,0,Math.PI*2);c.fill();
  c.strokeStyle='rgba(0,245,255,.15)';c.lineWidth=.8;
  c.beginPath();c.moveTo(j.cx-j.outerR,j.cy);c.lineTo(j.cx+j.outerR,j.cy);c.stroke();
  c.beginPath();c.moveTo(j.cx,j.cy-j.outerR);c.lineTo(j.cx,j.cy+j.outerR);c.stroke();
  c.globalAlpha=j.active?.93:.42;
  const bg=c.createRadialGradient(j.bx-j.innerR*.3,j.by-j.innerR*.3,1,j.bx,j.by,j.innerR);
  bg.addColorStop(0,'#fff');bg.addColorStop(.4,'#00f5ff');bg.addColorStop(1,'#003388');
  c.fillStyle=bg;c.shadowColor='#00f5ff';c.shadowBlur=j.active?18:7;
  c.beginPath();c.arc(j.bx,j.by,j.innerR,0,Math.PI*2);c.fill();c.shadowBlur=0;
  c.restore();
}
function joyXY(cx,cy){
  const r=G.canvas.getBoundingClientRect();
  return{x:(cx-r.left)*(G.canvas.width/r.width),y:(cy-r.top)*(G.canvas.height/r.height)};
}
function joyMove(cx,cy){
  const{x,y}=joyXY(cx,cy);
  let dx=x-JOY.cx,dy=y-JOY.cy;
  const dist=Math.sqrt(dx*dx+dy*dy),maxD=JOY.outerR-JOY.innerR*.4;
  if(dist>maxD){dx=dx/dist*maxD;dy=dy/dist*maxD;}
  JOY.bx=JOY.cx+dx;JOY.by=JOY.cy+dy;JOY.dx=dx/maxD;JOY.dy=dy/maxD;
  if(Math.abs(JOY.dx)>=.28||Math.abs(JOY.dy)>=.28){
    if(Math.abs(JOY.dx)>=Math.abs(JOY.dy))setDir(JOY.dx>0?1:-1,0);
    else setDir(0,JOY.dy>0?1:-1);
  }
}

const gc=$('gc');
gc.style.touchAction='none';
gc.addEventListener('pointerdown',e=>{
  if(!G.ctx)return;e.preventDefault();
  const{x,y}=joyXY(e.clientX,e.clientY);
  JOY.cx=x;JOY.cy=y;JOY.bx=x;JOY.by=y;JOY.active=true;JOY.pid=e.pointerId;JOY.dx=0;JOY.dy=0;
  try{gc.setPointerCapture(e.pointerId);}catch(e){}
},{passive:false});
gc.addEventListener('pointermove',e=>{if(!JOY.active||e.pointerId!==JOY.pid)return;e.preventDefault();joyMove(e.clientX,e.clientY);},{passive:false});
gc.addEventListener('pointerup',e=>{if(e.pointerId===JOY.pid){JOY.active=false;JOY.dx=0;JOY.dy=0;JOY.pid=-1;JOY.bx=JOY.cx;JOY.by=JOY.cy;}});
gc.addEventListener('pointercancel',e=>{if(e.pointerId===JOY.pid){JOY.active=false;JOY.pid=-1;}});

// ══ KEYBOARD ══
function setDir(dx,dy){
  if(!G||!G.player||G.player.dead||G.gameOver||G.won)return;
  G.player.nextDir=[dx,dy];
  if(G.player.dir[0]===0&&G.player.dir[1]===0)G.player.dir=[dx,dy];
}
function onKey(e){
  if(!$('gameScreen').classList.contains('active'))return;
  const m={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1],a:[-1,0],d:[1,0],w:[0,-1],s:[0,1]};
  if(m[e.key]){e.preventDefault();setDir(...m[e.key]);}
  if(e.key==='p'||e.key==='P')togglePause();
  if(e.key==='Escape'){if(RAF)cancelAnimationFrame(RAF);droneStop();paused=false;G={};$('pauseOverlay').classList.remove('show');$('gameOverlay').classList.remove('show');showScreen('menuScreen');}
}
document.addEventListener('keydown',onKey,true);
window.addEventListener('keydown',onKey,true);
window.addEventListener('resize',()=>{if($('gameScreen').classList.contains('active')&&G.level)setTimeout(()=>initGame(G.level,G.carryBeers||0),80);});
</script>
